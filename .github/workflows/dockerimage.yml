name: Docker Image CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # ── PR build ─────────────────────────────────────────────
      - name: Set PR tags
        if: github.event_name == 'pull_request'
        run: |
          echo "IMAGE_TAGS=${{ github.repository }}:beta,${{ github.repository }}:DEV-PR-${{ github.event.number }}" >> $GITHUB_ENV

      # ── Master / manual build: read latest tag and bump minor ─
      - name: Get latest semver tag
        if: github.event_name != 'pull_request'
        id: get_tag
        run: |
          git fetch --tags
          LATEST=$(git tag --list 'v*.*' \
            | sort -t. -k1,1V -k2,2n \
            | tail -n1)
          if [ -z "$LATEST" ]; then LATEST="v1.0"; fi
          echo "Latest tag: $LATEST"
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          NEW_TAG="v${MAJOR}.$((MINOR + 1))"
          echo "New tag: $NEW_TAG"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          REGISTRY_HOST=$(echo "${{ github.server_url }}" | sed 's|https://||')
          echo "REGISTRY_HOST=${REGISTRY_HOST}" >> $GITHUB_ENV
          GITEA="${REGISTRY_HOST}/${{ github.repository }}"
          echo "IMAGE_TAGS=${{ github.repository }}:latest,${{ github.repository }}:${NEW_TAG},${GITEA}:latest,${GITEA}:${NEW_TAG}" >> $GITHUB_ENV

      - name: Create and push git tag
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ env.NEW_TAG }}"
          git push origin "${{ env.NEW_TAG }}"

      # ── Build & push ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to Gitea registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_TAGS }}
